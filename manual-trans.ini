[Memory]
; AOB scanning runs first and re-locates the offsets below automatically
; for your exact game build. These INI values are only used if that scan
; fails (e.g. right after a game update, before the patterns are fixed).
; Set this to 0 for fail-closed behavior after a GTA update (recommended
; default - writing to a wrong offset on the wrong build can crash the
; game or corrupt vehicle state).
; Set to 1 only after you've verified the offsets below for YOUR exact
; game.exe build (e.g. with Cheat Engine).
AllowIniFallback=0

[Offsets]
; Fallback values only, used when AllowIniFallback=1 and the AOB scan
; failed. These are almost certainly wrong for your current game build -
; verify them yourself before enabling the fallback.
Gear=0x7C0
NextGear=0x7BE
Clutch=0x7D0
RPM=0x7D4

[Controls]
; Virtual-key codes: 16 = LSHIFT, 17 = LCONTROL, 88 = X
ShiftUp=16
ShiftDown=17
ClutchKey=88

[Debug]
Overlay=1

[Vehicles]
; Quadbikes report more than one drive gear in some game versions even
; though they're commonly driven like an automatic. Set to 0 to always
; skip manual shifting on quadbikes regardless of gear count.
AllowQuadbikes=1
; Prefer writing the real Clutch memory offset instead of the cruder
; power-cheat trick when holding the clutch key. Set to 0 to always use
; the power-cheat trick (e.g. if your clutch offset behaves oddly).
UseRealClutch=1