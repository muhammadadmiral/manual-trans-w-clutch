[Memory]
; AOB scanning runs first. These offsets are used only when scanning fails.
; Set this to 0 for fail-closed behavior after a GTA update.
AllowIniFallback=0

[Offsets]
; Legacy fallback values only. Verify them for your exact executable.
Gear=0x7C0
NextGear=0x7BE
Clutch=0x7D0
RPM=0x7D4

[Controls]
; Virtual-key codes: 16 = LSHIFT, 17 = LCONTROL, 88 = X
ShiftUp=16
ShiftDown=17
ClutchKey=88

[Debug]
Overlay=1
